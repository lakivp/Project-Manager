<h1 mat-dialog-title>
  {{ 'filter' | translate }}
</h1>
<div mat-dialog-content>
  <mat-form-field appearance="fill" style="width: 100%;">
    <mat-label>{{ 'selectPr' | translate }}</mat-label>
    <mat-select [(ngModel)]="selectedPriorities" multiple>
      <mat-option value="Low">{{ 'Low' | translate }}</mat-option>
      <mat-option value="Medium">{{ 'Medium' | translate }}</mat-option>
      <mat-option value="High">{{ 'High' | translate }}</mat-option>
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="fill" style="width: 100%;">
    <mat-label>{{ 'startDate' | translate }}</mat-label>
    <input matInput [matDatepicker]="startPicker" [(ngModel)]="startDate">
    <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
    <mat-datepicker #startPicker></mat-datepicker>
  </mat-form-field>
  <mat-form-field appearance="fill" style="width: 100%;">
    <mat-label>{{ 'endDate' | translate }}</mat-label>
    <input matInput [matDatepicker]="endPicker" [(ngModel)]="endDate">
    <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
    <mat-datepicker #endPicker></mat-datepicker>
  </mat-form-field>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">{{ 'cancel' | translate }}</button>
  <button mat-button (click)="resetFilter()">{{ 'resetFilter1' | translate }}</button>
  <button mat-button (click)="applyFilter()">{{ 'applyFilter1' | translate }}</button>
</div>
