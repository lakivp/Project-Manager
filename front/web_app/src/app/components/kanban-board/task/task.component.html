<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<div *ngIf="type!='Done' && type!='Completed'" class="taskContainer"  [routerLink]="['/taskDescription', {taskId:this.task.id}]">
   
    <div class="taskFooter">
        <!-- <img src={{task.assignee}} class="assignee"> -->
        <img  *ngIf = "this.imageProfileThis[0]" class="pfp" src="{{ this.imageProfileThis[0] }}"  />
        <img *ngIf = "this.imageProfileThis[1]" class="pfp" src="{{ this.imageProfileThis[1] }}"  style="position:absolute; left:20px"/>
        <img *ngIf = "this.imageProfileThis[2]" class="pfp" src="{{ this.imageProfileThis[2] }}"  style="position:absolute; left:40px"/>
            <p class="timeReq">{{task.kraj}}</p>
    </div>
    <p class="taskDesc" style="margin:0; padding:0; margin-top: 0.5em; max-width:200px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    ">{{task.naziv}}</p>
</div>

<div *ngIf="type=='Done' || type=='Completed'" class="taskContainer "  [routerLink]="['/taskDescription', {taskId:this.task.id}]">
    
    <div class="taskFooter">
        <img class="pfp" src="{{ imageProfileThis }}" />
        <!-- <img src={{task.assignee}} class="assignee"> -->
        <div class="scaleAndTime">
            <div class="scale">
                <span class="timePassed"></span>
                <span class="timeLeft"></span>
            </div>
            <p class="timeNeeded">{{task.kraj}}</p>
        </div>
    </div>
    <p class="taskDesc">{{task.naziv}}</p>
</div>
